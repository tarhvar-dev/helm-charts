{{- range .Values.sites }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "app.fullname" $ }}-{{ .host | replace "." "-" }}
spec:
  secretName: {{ include "app.fullname" $ }}-{{ .host | replace "." "-" }}-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .host }}
---
{{- end }}
