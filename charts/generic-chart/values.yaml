replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  className: traefik
  annotations: {}
  host: example.com
  path: /
  pathType: Prefix
  # Set to use an existing TLS secret (disables cert generation)
  tlsSecretName: ""

certificate:
  enabled: true
  issuerRef:
    name: letsencrypt-wildcard
    kind: ClusterIssuer

envFrom: []
# - secretRef:
#     name: my-secret

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
